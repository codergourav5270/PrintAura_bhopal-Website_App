# STEP-10: Scheduled DB + storage metadata backups (no app code changes).
# GitHub repository secrets: SUPABASE_DB_URL, SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF

name: Supabase Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Prepare backup directory
        run: mkdir -p backup-artifacts

      - name: Database dump
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) backup job start" | tee backup-artifacts/backup.log
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL not set — add pooled/direct Postgres URL secret for supabase db dump" >> backup-artifacts/backup.log
          else
            supabase db dump --db-url "$SUPABASE_DB_URL" -f backup-artifacts/db-backup.sql
            echo "db dump written backup-artifacts/db-backup.sql" >> backup-artifacts/backup.log
          fi

      - name: Link project (storage CLI)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        continue-on-error: true
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Skip supabase link (set SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF)" >> backup-artifacts/storage-backup.log
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Storage bucket manifests
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          {
            echo "Storage backup log $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Buckets: hero-media category-media site-media admin-media"
          } >> backup-artifacts/storage-backup.log
          for bucket in hero-media category-media site-media admin-media; do
            f="backup-artifacts/storage-${bucket}-manifest.txt"
            echo "# $bucket $(date -u)" > "$f"
            supabase storage ls -r "$bucket" >> "$f" 2>&1 || echo "storage ls failed — check link and CLI version" >> "$f"
          done
        continue-on-error: true

      - name: Upload backup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}-${{ github.sha }}
          path: backup-artifacts/
          retention-days: 30
